version: '3'
services:
  redis:
    image: redis:alpine
    ports:
      - "6379:6379"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 30s
      timeout: 10s
      retries: 5

  postgres:
    image: postgres:13
    environment:
      - POSTGRES_USER=myuser
      - POSTGRES_PASSWORD=mypassword
      - POSTGRES_DB=mydb
    ports:
      - "5432:5432"
    restart: unless-stopped
    volumes:
      - ./pgdata:/var/lib/postgresql/data

  middleware_service:
    build: ./middleware
    ports:
      - "5000:5000"
    volumes:
      - ./files:/files:rw  # Для хранения файлов
    depends_on:
      redis:
        condition: service_healthy
    environment:
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/0
      - POSTGRES_HOST=postgres
      - POSTGRES_USER=myuser
      - POSTGRES_PASSWORD=mypassword
      - POSTGRES_DB=mydb
    restart: unless-stopped
    entrypoint: ["sh", "-c", "sleep 20 && python service.py"]  # Задержка перед запуском

  python_worker_example:
    build: ./workers/python_worker_example
    depends_on:
      redis:
        condition: service_healthy
    environment:
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/0
    restart: unless-stopped
    entrypoint: ["sh", "-c", "sleep 20 && celery -A worker worker --loglevel=info"]  # Запуск Celery воркера
    scale: 1  # Количество воркеров

  csharp_worker_example:
    build:
      context: ./workers/csharp_worker_example
      target: final
    depends_on:
      redis:
        condition: service_healthy
    environment:
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/0
    restart: unless-stopped
    entrypoint: ["sh", "-c", "sleep 20 && celery -A celery_bridge worker --loglevel=info"]  # Запуск Celery воркера с C# мостом
    scale: 1  # Количество воркеров

  video_worker_example:
    build: ./workers/video_worker_example
    volumes:
      - ./files:/files:rw  # Для хранения файлов
    depends_on:
      redis:
        condition: service_healthy
    environment:
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/0
    restart: unless-stopped
    entrypoint: ["sh", "-c", "sleep 20 && celery -A worker worker --loglevel=info"]  # Запуск Celery воркера
    scale: 1  # Количество воркеров

  rust_worker_example:
    build: ./workers/rust_worker_example
    depends_on:
      redis:
        condition: service_healthy
    environment:
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/0
    restart: unless-stopped
    entrypoint: ["sh", "-c", "sleep 20 && celery -A celery_bridge worker --loglevel=info"]  # Запуск Celery воркера с Rust мостом
    scale: 1  # Количество воркеров

  # Сервис для запуска тестов
  test_runner:
    build:
      context: .
      dockerfile: Dockerfile.test
    depends_on:
      - redis
      - postgres
      - middleware_service
      - python_worker_example
      - csharp_worker_example
      - video_worker_example
      - rust_worker_example
    environment:
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/0
      - POSTGRES_HOST=postgres
      - POSTGRES_USER=myuser
      - POSTGRES_PASSWORD=mypassword
      - POSTGRES_DB=mydb
    volumes:
      - ./tests:/app/tests:ro
      - ./workers:/app/workers:ro
      - ./middleware:/app/middleware:ro
    command: ["pytest", "-v"]